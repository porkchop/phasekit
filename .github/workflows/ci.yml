name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe --tags` yields real release
          # versions for the version-awareness code under test.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: File-registration self-check
        run: python3 scripts/enrich-project.py --self-check

      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
